version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      commitlint:
        patterns:
          - '@commitlint/*'
      nx:
        patterns:
          - '@nx/*'
      swc:
        patterns:
          - '@swc/*'
    cooldown:
      default-days: 3
      semver-major-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
    commit-message:
      prefix: 'ci'
      include: 'scope'
