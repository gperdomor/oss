include:
  - template: Workflows/MergeRequest-Pipelines.gitlab-ci.yml

default:
  image: node:24@sha256:40ad9f3064e67d6860b4bc3fe1880b2953934fd6320ada990e45fe0efa6badd7

variables:
  CI: 'true'
  GIT_DEPTH: 0
  GIT_FETCH_EXTRA_FLAGS: --filter=tree:0

lint:commit-msg:
  before_script:
    - npm install --global corepack@latest
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  script:
    - pnpm exec commitlint --from ${CI_MERGE_REQUEST_DIFF_BASE_SHA} --to ${CI_COMMIT_SHA}
  rules:
    - if: $CI_MERGE_REQUEST_IID
      when: always
    - when: never

lint:branch:
  script:
    - |
      export BRANCH_REGEX_RULE="^(master|main|develop|release){1}$|^(feature|fix|hotfix|release|renovate)\/.+$"
      if [[ $CI_COMMIT_REF_NAME =~ $BRANCH_REGEX_RULE ]]; then
        echo "Branch name validation passed!"
      else
        echo "Error Msg: Branch name validate failed please rename your current branch"
        echo "Branch Name: \"$CI_COMMIT_REF_NAME\""
        echo "Pattern: \"/$BRANCH_REGEX_RULE/g\""
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

# Main job
CI:
  interruptible: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        NX_CLOUD_ACCESS_TOKEN: ${NX_CLOUD_ACCESS_TOKEN_RW}
    - variables:
        NX_CLOUD_ACCESS_TOKEN: ${NX_CLOUD_ACCESS_TOKEN_RO}
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - npm install --global corepack@latest
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
  script:
    # This enables task distribution via Nx Cloud
    # Run this command as early as possible, before dependencies are installed
    # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
    # Uncomment this line to enable task distribution
    # - pnpm dlx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

    - pnpm install --frozen-lockfile
    - export NX_HEAD=$CI_COMMIT_SHA
    - export NX_BASE=${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)}

    # Prepend any command with "nx record --" to record its logs to Nx Cloud
    # - pnpm exec nx record -- echo Hello World
    - pnpm exec nx-cloud record -- nx format:check
    - pnpm exec nx affected -t lint test build typecheck
    # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
  after_script:
    - pnpm exec nx fix-ci
  artifacts:
    reports:
      codequality: gl-codequality.json
